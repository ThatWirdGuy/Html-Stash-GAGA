<iframe id="gameFrame" src="" width="100%" height="500px"></iframe>

<script>
  const fullPath = window.location.pathname;

  const pathParts = fullPath.split('/');
  const slug = pathParts[pathParts.length - 1];

  if (slug && slug !== "Scr.html") {
    const iframe = document.getElementById('gameFrame');

    iframe.src = "https://html-stash-gaga.vercel.app/Baldis-Games/Scr.html/" + slug + ".html";
    
    console.log("Loading game:", slug);
  } else {
    console.log("No specific game requested in URL.");
  }
</script>
